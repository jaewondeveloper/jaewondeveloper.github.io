<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me - jaewondeveloper</title>
  <script src="https://cdn.jsdelivr.net/gh/jaewondeveloper/minecraftbutton/mc-button.js" defer></script>
  
  <style>
    @font-face {
        font-family: 'NeoDonggeunmo';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --font-pixel: 'NeoDonggeunmo', monospace; --bg-topbar: rgba(20, 20, 24, 0.9); }
    html, body { height: 100%; background: #0b0b0d; font-family: var(--font-pixel); color: #ffffff; overflow-x: hidden; }

    .hero-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background-image: url('https://preview.redd.it/minecraft-wallpapers-v0-p3prxq134dtf1.png?width=1080&crop=smart&auto=webp&s=5d9f7d63e940b22b48abaa3eab1bfd53052cf2cd');
      background-size: cover;
      background-position: center;
      padding: 100px 20px 60px 20px;
    }

    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(11, 11, 13, 0.95) 100%); z-index: 1; }
    .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 54px; background: var(--bg-topbar); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255, 255, 255, 0.07); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
    .nav-left { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .nav-title { font-size: 14px; color: #eee; letter-spacing: 0.5px; }

    .main-content { position: relative; z-index: 2; max-width: 700px; width: 100%; display: flex; flex-direction: column; gap: 24px; }
    .page-header { text-align: center; margin-bottom: 10px; }
    .page-title { font-size: 36px; color: #ffffff; text-shadow: 0 2px 0 #333, 2px 4px 0 #111; }

    .info-box { background: rgba(20, 20, 24, 0.85); border: 2px solid #333; padding: 24px; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    .info-title { font-size: 22px; color: #1cb853; margin-bottom: 14px; border-bottom: 2px dashed #333; padding-bottom: 6px; }
    .info-p { font-size: 15px; color: #ddd; line-height: 1.8; margin-bottom: 10px; }

    .profile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      border-bottom: 2px dashed #333;
      padding-bottom: 6px;
    }
    .profile-head .info-title {
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
      flex-shrink: 0;
    }
    .profile-avatar {
      display: block;
      height: 2.2em;
      width: auto;
      max-height: 48px;
      object-fit: contain;
      flex-shrink: 0;
      border: none;
      background: transparent;
      border-radius: 0;
    }

    .status-tag { display: inline-block; background: #0f8b3e; color: #fff; padding: 2px 8px; font-size: 12px; border-radius: 3px; margin-top: 4px; }

    .back-btn-box { display: flex; justify-content: center; margin-top: 10px; }
    mc-button { font-family: 'NeoDonggeunmo', sans-serif !important; font-size: 14px; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left" onclick="location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <rect width="16" height="16" fill="#1cb853"/><rect x="3" y="3" width="3" height="3" fill="#111116"/><rect x="10" y="3" width="3" height="3" fill="#111116"/><rect x="5" y="7" width="6" height="2" fill="#111116"/><rect x="4" y="9" width="2" height="3" fill="#111116"/><rect x="10" y="9" width="2" height="3" fill="#111116"/><rect x="6" y="11" width="4" height="2" fill="#111116"/>
      </svg>
      <span class="nav-title">jaewondeveloper</span>
    </div>
  </nav>

  <div class="hero-container">
    <div class="hero-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">About Me</h1>
      </div>

      <div class="info-box">
        <div class="profile-head">
          <h2 class="info-title">Profile</h2>
          <img
            class="profile-avatar"
            src="https://i.postimg.cc/pX1hpvLL/recore.png"
            alt="프로필"
            decoding="async"
          />
        </div>
        <p class="info-p">👋 안녕하세요! 프론트엔드를 주로 다루고 있는 중학생 개발자 <strong>jaewondev</strong>입니다.</p>
        <p class="info-p">윈도우, 안드로이드, 웹 개발을 할 수 있고 프론트엔드 개발을 주로하지만 가끔씩 백앤드도 만듭니다.</p>
        <span class="status-tag">현재 상태: 생존 및 공부 중 📚</span>
      </div>

      <div class="info-box">
        <h2 class="info-title">Skills</h2>
        <p class="info-p">✔ HTML5 / CSS3 / JavaScript</p>
        <p class="info-p">✔ UI/UX 구조 설계 및 미니멀리즘 디자인</p>
        <p class="info-p">✔ Web Components & Custom Elements 패키징</p>
      </div>

      <div class="back-btn-box">
        <mc-button bg-top="#1cb853" bg-bottom="#0f8b3e" text-color="#ffffff" width="160px" height="50px" onclick="location.href='index.html'">
          돌아가기
        </mc-button>
      </div>
    </main>
  </div>

</body>
</html>
