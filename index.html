<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jaewondeveloper</title>
  
  <meta property="og:type" content="website" />
  <meta property="og:title" content="jaewondeveloper" />
  <meta property="og:description" content="흔한 중학생 개발자" />
  <meta property="og:image" content="https://raw.githubusercontent.com/jaewondeveloper/jaewondeveloper.github.io/main/banner.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="jaewondeveloper" />
  <meta name="twitter:description" content="흔한 중학생 개발자" />
  <meta name="twitter:image" content="https://raw.githubusercontent.com/jaewondeveloper/jaewondeveloper.github.io/main/banner.png" />

  <script src="https://cdn.jsdelivr.net/gh/jaewondeveloper/minecraftbutton/mc-button.js" defer></script>
  
  <style>
    /* ── 네오둥근모 폰트 주입 ── */
    @font-face {
        font-family: 'NeoDonggeunmo';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
        font-weight: normal;
        font-display: swap;
    }

    /* ── 기본 리셋 및 변수 설정 ── */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --font-pixel: 'NeoDonggeunmo', monospace;
      --bg-topbar: rgba(20, 20, 24, 0.9);
    }

    html, body {
      height: 100%;
      background: #0b0b0d;
      font-family: var(--font-pixel);
      color: #ffffff;
      overflow-x: hidden;
    }

    /* ── 배경화면 원본 다이렉트 이미지 URL ── */
    .hero-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: url('https://preview.redd.it/minecraft-wallpapers-v0-p3prxq134dtf1.png?width=1080&crop=smart&auto=webp&s=5d9f7d63e940b22b48abaa3eab1bfd53052cf2cd');
      background-size: cover;
      background-position: center;
      text-align: center;
      padding: 80px 20px 40px 20px;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.2) 0%, 
        rgba(0, 0, 0, 0.4) 60%,
        rgba(11, 11, 13, 0.9) 100%
      );
      z-index: 1;
    }

    /* ── 상단 내비게이션 바 (Top Bar) ── */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: var(--bg-topbar);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .nav-title {
      font-size: 14px;
      color: #eee;
      letter-spacing: 0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-icon-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .nav-icon-btn:hover {
      color: #fff;
    }

    /* ── 중앙 메인 콘텐츠 영역 ── */
    .main-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-box {
      margin-bottom: 10px;
    }

    .logo-main {
      font-size: 46px;
      color: #ffffff;
      display: block;
      line-height: 1.2;
      letter-spacing: 1px;
      text-shadow:
        0 2px 0 #333,
        2px 4px 0 #222,
        3px 6px 0 #111,
        0 0 30px rgba(255, 255, 255, 0.2);
    }

    .logo-sub {
      font-size: 20px;
      color: #1cb853;
      display: block;
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-shadow:
        0 2px 0 #0f8b3e,
        1px 3px 0 #074a21,
        0 0 20px rgba(28, 184, 83, 0.4);
    }

    .description {
      font-size: 16px;
      color: #ceced4;
      font-weight: 500;
      letter-spacing: -0.3px;
      margin-top: 10px;
    }

    .warning-box {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #eab308;
      background: rgba(234, 179, 8, 0.08);
      border: 1px solid rgba(234, 179, 8, 0.2);
      padding: 6px 14px;
      border-radius: 4px;
      margin-top: 4px;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    mc-button {
      font-family: 'NeoDonggeunmo', sans-serif !important;
      font-size: 14px;
    }

    .social-group {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: center;
      width: 100%;
    }

    .github-btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .github-icon {
      fill: currentColor;
    }

    .scroll-arrow {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      animation: bounce 1.6s infinite;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .scroll-arrow:hover {
      opacity: 1;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, 8px); }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left" onclick="location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <rect width="16" height="16" fill="#1cb853"/>
        <rect x="3" y="3" width="3" height="3" fill="#111116"/>
        <rect x="10" y="3" width="3" height="3" fill="#111116"/>
        <rect x="5" y="7" width="6" height="2" fill="#111116"/>
        <rect x="4" y="9" width="2" height="3" fill="#111116"/>
        <rect x="10" y="9" width="2" height="3" fill="#111116"/>
        <rect x="6" y="11" width="4" height="2" fill="#111116"/>
      </svg>
      <span class="nav-title">jaewondeveloper</span>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" aria-label="검색">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
      <button class="nav-icon-btn" aria-label="메뉴">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>
  </nav>

  <div class="hero-container">
    <div class="hero-overlay"></div>

    <main class="main-content">
      <div class="logo-box">
        <h1 class="logo-main">jaewondev</h1>
        <span class="logo-sub">frontend developer</span>
      </div>

      <p class="description">흔한 중학생 개발자</p>
      
      <div class="warning-box">
        <span>⚠️ 공부이슈로 인해 개발을 많이하지 않습니다 ⚠️</span>
      </div>

      <div class="btn-group">
        <mc-button bg-top="#1cb853" bg-bottom="#0f8b3e" text-color="#ffffff" width="220px" height="56px" onclick="location.href='project.html'">
          프로젝트
        </mc-button>
        <mc-button bg-top="#1cb853" bg-bottom="#0f8b3e" text-color="#ffffff" width="220px" height="56px" onclick="location.href='about.html'">
          소개
        </mc-button>
        <mc-button bg-top="#1cb853" bg-bottom="#0f8b3e" text-color="#ffffff" width="220px" height="56px" onclick="location.href='blog.html'">
          블로그
        </mc-button>
      </div>

      <div class="social-group">
        <mc-button bg-top="#1cb853" bg-bottom="#0f8b3e" text-color="#ffffff" width="180px" height="50px" aria-label="GitHub" onclick="location.href='https://github.com/jaewondeveloper'">
          <div class="github-btn-content">
            <svg class="github-icon" width="18" height="18" viewBox="0 0 24 24">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
            깃허브
          </div>
        </mc-button>
      </div>
    </main>

    <div class="scroll-arrow" aria-label="스크롤 다운">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
  </div>

</body>
</html>
